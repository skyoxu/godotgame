interface:
  display_name: "Generate 2D Map"
  short_description: "Image-generated 2D scene maps, props, previews, collision, and scene-hook metadata."
  default_prompt: "Use $generate2dmap to create a playable image-generated 2D scene map with a foundation-only base/background, an in-world reference mockup generated from the visible base/background image, and final separate scene objects/props generated after viewing both the base/background and reference mockup as visual context; generate visible map art through the repo-local aiartmirror/OpenAI wrapper, preferably via C:\\Users\\weiruan\\.codex\\skills\\generate2dmap\\scripts\\generate_map_image.py so the workflow uses the project's gpt-image-2 SDK bridge; for any playable/editable layered map, do not bake runtime-controlled props, interactables, hazards, doors, gates, pickups, actors, or foreground occluders into the base/background; classify every prop/object before generation, use square 2x2/3x3/4x4 prop packs only for compact props, and use one-by-one, non-actor 1x3/1x4 platform strips, custom wide cells, tile/object layers, or engine-native objects for floors, platforms, bridges, walls, ladders, gates, long hazards, wide/tall objects, and collision-aligned objects; for side-view/platformer stages the background must be scenery-only; the reference mockup should plan at most 9 distinct visible runtime props/objects unless I ask for more; include prompt files, scene hooks, collision, zones, a QA preview, and engine-ready metadata; do not stop at the reference mockup, draw annotated diagrams, generate actor sprites, or ship a single baked image as the runtime map unless I ask for a flat background."

policy:
  allow_implicit_invocation: true
